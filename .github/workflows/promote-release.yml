name: promote release

on:
  workflow_call:

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Install yaml package
        run: npm install yaml

      - name: Check version and promote if needed
        uses: actions/github-script@v8
        with:
          script: |
            // Import YAML parser
            const yaml = require('yaml');

            const refType = process.env.GITHUB_REF_TYPE;
            const refName = process.env.GITHUB_REF_NAME;

            if (refType === 'tag') {
              if (!refName.startsWith('debian/')) {
                console.log(`Tag '${refName}' is not a debian release tag - skipping`);
                return;
              }
              console.log(`Tag mode: processing only ${refName}`);
            } else {
              console.log('Scheduled/manual mode: processing all matching releases');
            }

            // Get all releases
            const allReleases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            // Filter to our debian/* prereleases, optionally filtered to specific tag
            const ourPrereleases = allReleases.filter(r =>
              r.prerelease &&
              r.tag_name.startsWith('debian/') &&
              (refType !== 'tag' || r.tag_name === refName)
            );

            if (ourPrereleases.length === 0) {
              console.log('No prereleases to process');
              return;
            }

            // Get all full releases from parent repo
            const parentReleases = await github.paginate(github.rest.repos.listReleases, {
              owner: 'dionysius',
              repo: 'vaultwarden-deb',
              per_page: 100
            });

            const parentFullReleases = parentReleases.filter(r =>
              !r.prerelease &&
              r.tag_name.startsWith('debian/')
            );

            // For each parent release, fetch once and check against all our prereleases
            for (const parentRelease of parentFullReleases) {
              try {
                // Extract upstream version from debian tag e.g. "debian/1.35.8-1" -> "1.35.8"
                const upstreamVersion = parentRelease.tag_name.replace(/^debian\/(.+?)-\d+$/, '$1');

                // Fetch DockerSettings.yaml from the upstream tag (upstream source lives on upstream/* tags)
                const settingsUrl = `https://raw.githubusercontent.com/dionysius/vaultwarden-deb/refs/tags/upstream/${upstreamVersion}/docker/DockerSettings.yaml`;
                const response = await fetch(settingsUrl);

                if (!response.ok) {
                  // Skip releases without DockerSettings.yaml (older releases)
                  if (response.status === 404) {
                    continue;
                  }
                  throw new Error(`Failed to fetch DockerSettings.yaml: ${response.status} ${response.statusText}`);
                }

                const settingsYaml = await response.text();
                const settings = yaml.parse(settingsYaml);

                if (!settings?.vault_version) {
                  throw new Error('vault_version field not found in DockerSettings.yaml');
                }

                const parentVersion = settings.vault_version.toString().replace(/^v/, '');

                // Check if any of our prereleases matches this parent version
                for (const prerelease of ourPrereleases) {
                  const tag = prerelease.tag_name;
                  const ourVersion = tag.replace(/^debian\//, '');

                  // Match e.g. ourVersion "2026.3.1+0-2" against parentVersion "2026.3.1" (+ anchors to avoid 2026.3.10 false match)
                  if (ourVersion.startsWith(parentVersion + '+')) {
                    console.log(`parent ${parentRelease.tag_name} uses web_vault ${parentVersion} -> promoting ${tag}`);

                    await github.rest.repos.updateRelease({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      release_id: prerelease.id,
                      prerelease: false,
                      make_latest: 'legacy'
                    });

                    // Remove from list so we don't promote it again
                    ourPrereleases.splice(ourPrereleases.indexOf(prerelease), 1);

                    // If no more prereleases to check, we're done
                    if (ourPrereleases.length === 0) {
                      return;
                    }
                  }
                }
              } catch (error) {
                console.log(`Error processing parent release: ${error.message}`);
              }
            }
